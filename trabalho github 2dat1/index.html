<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso Érick Jacquin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <h1>Érick Jacquin</h1>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container flex">

                <!-- Coluna Esquerda -->
                <div class="left-column">
                    <h2>Aprenda culinária profissional com Érick Jacquin</h2>
                    
                    <p class="highlight-phrase">VOCÊ QUER SER A VENGONHA DA PROFISSION?</p>
                    
                    <p class="subtitle">Chega de comida medíocre. Aprenda técnicas reais e eleve seu nível na cozinha.</p>

                    <div class="benefits">
                        <p>Mais de 50 receitas</p>
                        <p>Aulas gravadas</p>
                        <p>Certificado incluso</p>
                    </div>

                    <form id="form-inscricao">
                        <h3>Inscreva-se agora</h3>
                        
                        <input type="text" placeholder="Seu nome" required>
                        <input type="email" placeholder="Seu e-mail" required>
                        <input type="tel" placeholder="Seu WhatsApp" required>
                        
                        <button type="submit">Quero me inscrever</button>
                    </form>
                </div>

                <!-- Coluna Direita -->
                <div class="right-column">
                    <img src="ErickJacquin.jpg" alt="Érick Jacquin" class="hero-image">
                </div>

            </div>
        </section>
    </main>

    <footer>
        <p>2026 - Curso Érick Jacquin</p>
    </footer>

    <script>
        document.getElementById('form-inscricao').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Inscrição realizada com sucesso!');
        });
    </script>

</body>
</html>
